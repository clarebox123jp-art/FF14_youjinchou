<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>相簿 | 幻想友人帳</title>
  <meta name="description" content="幻想友人帳的回憶相簿。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="has-bg" data-bgm="audio/相簿BGM.mp3">

  <!-- ★ 內頁固定背景圖（富士山）：樣式在 style.css 檔尾 .page-bg；想換圖改下面 url、想關掉整個 <div id="pageBg"> 刪掉 -->
  <div class="page-bg" id="pageBg">
    <div class="pbg-slide is-on" style="background-image:url('images/gallery-bg-fuji.webp')"></div>
  </div>

  <!-- ★ 右上角動畫特效（秋天楓葉飄落）：樣式在 style.css 檔尾 .corner-fx；想換圖改下面 url、想關掉整行刪掉 -->
  <div class="corner-fx" style="background-image:url('動畫/秋天楓葉飄落.gif')" aria-hidden="true"></div>

  <nav class="nav">
    <a href="index.html" class="brand sfx">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a45c" stroke-width="1.4">
        <path d="M12 2 L18 12 L12 22 L6 12 Z" /><path d="M12 2 L12 22 M6 12 L18 12" stroke-width="0.8" />
      </svg>
      <span>幻想友人帳</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="選單">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html" class="sfx">首頁</a>
      <a href="about.html" class="sfx">公會介紹</a>
      <a href="members.html" class="sfx">幹部成員</a>
      <a href="gallery.html" class="active sfx">相簿</a>
      <a href="shop.html" class="sfx">RP 商店</a>
    </div>
  </nav>

  <section class="section" style="padding-bottom:20px">
    <div class="wrap reveal" style="text-align:center">
      <p class="eyebrow">Gallery</p>
      <h1 style="font-size:clamp(2.2rem,6vw,3.4rem)">相簿</h1>
      <p class="body" style="margin:16px auto 0">那些捨不得刪的截圖與回憶。</p>
    </div>
  </section>

  <section class="section" style="padding-top:20px">
    <div class="wrap">
      <!-- 換照片：改 <img src="...">；換說明：改 <figcaption>。增減照片＝複製或刪一個 <figure class="photo">（計數會自動更新） -->
      <!-- ↓ 相簿分兩排跑馬燈（上：成員互動的回憶／下：公會小屋的景緻）。
           每排各自左右捲動、各自計數、可各自點圖放大。
           增減照片＝在對應 <div class="car-track"> 內複製或刪一個 <figure class="photo">，計數自動更新。
           JS 會自動初始化頁面上「每個」.carousel（見 js/main.js 第 6 段）。-->

      <!-- ── 上排：成員互動的回憶 ── -->
      <div class="reveal" style="text-align:center;margin-bottom:2px">
        <p class="eyebrow">Moments · 成員互動的回憶</p>
      </div>
      <div class="carousel reveal" id="galleryTop">
        <button class="car-arrow prev" aria-label="上一張">‹</button>
        <div class="car-track">
          <figure class="photo">
            <div class="photo-frame"><img src="images/first-meetup-badge.webp" alt="第一次網聚名牌" loading="lazy" /></div>
            <figcaption class="cap">2026.04.11，台北。第一次網聚的專屬名牌，把線上的緣分，攤在陽光下相認。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/father-son-time.webp" alt="十穗與小克的父子時光" loading="lazy" /></div>
            <figcaption class="cap">溫泉氤氳、金魚悠游，十穗與小克依偎的這一刻，時間都放慢了。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/小克瑞爾與小露貓的表演.webp" alt="小克瑞爾與小露貓的表演" loading="lazy" /></div>
            <figcaption class="cap">小克瑞爾與小露貓聯手獻藝的那一夜，燈光下的笑聲，比舞台還要閃亮。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/三店員調酒.webp" alt="三店員調酒" loading="lazy" /></div>
            <figcaption class="cap">三位店員在吧台後並肩搖盞，杯緣晃出的不只是酒，是整晚的熱鬧。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-sun-coast.webp" alt="公會團員大合照 太陽海岸" loading="lazy" /></div>
            <figcaption class="cap">陽光、浪聲與一整排並肩的身影——太陽海岸的這張大合照，把夏天曬進了每個人的笑容裡。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-sun-coast-jin.webp" alt="公會團員在太陽海岸排成人字" loading="lazy" /></div>
            <figcaption class="cap">大夥兒排成一個大大的「人」字漂浮海面——原來「友緣人」三個字，可以這樣寫。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-wedding.webp" alt="參加會員的婚禮" loading="lazy" /></div>
            <figcaption class="cap">受邀見證會員的婚禮，紅毯那端的誓言，我們也一起紅了眼眶。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-treasure-final.webp" alt="藏寶圖深層迷宮最終層" loading="lazy" /></div>
            <figcaption class="cap">一路過關斬將，終於站上深層迷宮的最後一層——寶藏是其次，並肩到底才是。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-new-year-eve.webp" alt="除夕迎新春" loading="lazy" /></div>
            <figcaption class="cap">除夕夜圍爐，煙火在螢幕裡炸開，新的一年，友人帳又多寫了好幾個名字。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-2026-countdown.webp" alt="2026 跨年合照" loading="lazy" /></div>
            <figcaption class="cap">倒數三、二、一——2026 的第一秒，是和你們一起跨過的。</figcaption>
          </figure>
        </div>
        <button class="car-arrow next" aria-label="下一張">›</button>
        <p class="car-counter"><span class="cur">1</span> / <span class="total">10</span></p>
      </div>

      <!-- ── 下排：公會小屋的景緻 ── -->
      <div class="reveal" style="text-align:center;margin:46px 0 2px">
        <p class="eyebrow">Our Home · 公會小屋的景緻</p>
      </div>
      <div class="carousel reveal" id="galleryBottom">
        <button class="car-arrow prev" aria-label="上一張">‹</button>
        <div class="car-track">
          <figure class="photo">
            <div class="photo-frame"><img src="images/house-stage-clair.webp" alt="公會小屋舞台上的小克瑞爾" loading="lazy" /></div>
            <figcaption class="cap">公會小屋的小舞台亮起，小克瑞爾站定的那刻，這個家就有了主角。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/公會的小溪發現河童.webp" alt="公會的小溪發現河童" loading="lazy" /></div>
            <figcaption class="cap">沿著公會的小溪散步，竟撞見一隻探頭的河童，連水聲都俏皮了起來。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-guild-land.webp" alt="買到公會地" loading="lazy" /></div>
            <figcaption class="cap">敲下這塊地的那一刻，白銀鄉多了一盞燈，我們終於有了家的門牌。</figcaption>
          </figure>
          <figure class="photo">
            <div class="photo-frame"><img src="images/gallery-bathhouse.webp" alt="公會澡堂" loading="lazy" /></div>
            <figcaption class="cap">白銀鄉的公會澡堂，暖湯蒸騰、燈影搖曳，一天的疲憊都溶進了這池溫柔裡。</figcaption>
          </figure>
        </div>
        <button class="car-arrow next" aria-label="下一張">›</button>
        <p class="car-counter"><span class="cur">1</span> / <span class="total">4</span></p>
      </div>

      <!-- 舊版（兩大類 grid）與佔位圖說明，保留備查（鐵則①）：
           分類一 曾經的回憶點滴：表演 / 三店員調酒
           分類二 溫馨的公會小屋：house-stage-clair / 公會的小溪發現河童
           佔位 gallery-1~6：週末極副本 / 白銀鄉的家 / DC知識王 / 第一場網聚 / 藏寶圖團 / 潛水艇菜田 -->
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">
      <span class="sigil">✦</span>
      <h3>幻想友人帳</h3>
      <p>Final Fantasy XIV · 鳳凰伺服器 開服公會</p>
      <p>公會房：白銀鄉 9 區 30 號 溫泉區</p>
      <p class="copyright">© 2026 幻想友人帳. 本站為 FF14 玩家自製，與 SQUARE ENIX 無關。</p>
    </div>
  </footer>

  <button class="audio-btn" id="audioBtn" aria-label="背景音樂開關">
    <span class="note">♪</span><span class="label">音樂：關</span>
  </button>

  <script src="main.js"></script>
</body>
</html>
